{% set name = "peccary" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/peccary-{{ version }}.tar.gz
  sha256: 766e715a25f437e46595420f4f1a2d318dcd0e12649f987056507f2536d10cb0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=41.2
    - setuptools-scm
    - wheel >=0.29.0
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.14
    - scipy >=0.19
    - matplotlib-base

test:
  imports:
    - peccary
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/soleyhyman/peccary/
  summary: Package for identifying regular, complex, and stochastic behavior in timeseries
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - soleyhyman
